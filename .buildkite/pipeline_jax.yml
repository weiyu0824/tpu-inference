steps:
  - group: "${TESTS_GROUP_LABEL:-[jax] TPU6e Tests Group}"
    steps:

      # -----------------------------------------------------------------
      # Centralized Build Step (Runs on the CPU queue)
      # -----------------------------------------------------------------
      - label: ":docker: Build and Push Base Image (${TPU_VERSION:-tpu6e})"
        key: "${TPU_VERSION:-tpu6e}_build_docker"
        agents:
          queue: cpu_64_core
        env:
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        commands:
          - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

      # -----------------------------------------------------------------
      # TEST STEPS - Calling wrapper
      # -----------------------------------------------------------------
      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX models"
        key: "${TPU_VERSION:-tpu6e}_test_0"
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX models with quantization"
        key: ${TPU_VERSION:-tpu6e}_test_1
        soft_fail: true
        env:
          QUANTIZATION: "True"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX new models"
        key: ${TPU_VERSION:-tpu6e}_test_2
        soft_fail: true
        env:
          NEW_MODEL_DESIGN: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX + vLLM models on single chip"
        key: ${TPU_VERSION:-tpu6e}_test_3
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E MLperf tests for Llama4 models"
        key: ${TPU_VERSION:-tpu6e}_test_4
        soft_fail: true
        env:
          NEW_MODEL_DESIGN: "1"
          USE_V6E8_QUEUE: "True"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      - label: "${TPU_VERSION:-tpu6e} E2E speculative decoding test"
        key: ${TPU_VERSION:-tpu6e}_test_6
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - |
              .buildkite/scripts/run_in_docker.sh \
                bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/e2e/test_speculative_decoding.py'

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests part1"
        key: ${TPU_VERSION:-tpu6e}_test_7_1
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        artifact_paths: ".coverage.part1.${TPU_VERSION:-tpu6e}"
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - rm -f .coverage.part1.${TPU_VERSION:-tpu6e}
          - |
            .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/layers/vllm/backends/test_flash_attn.py /workspace/tpu_inference/tests/layers/vllm/test_awq.py /workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_moe.py /workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_fp8.py /workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_int8.py --cov-config=/workspace/tpu_inference/.coveragerc --cov tpu_inference; if [ -f .coverage ]; then cp .coverage /tmp/hf_home/.coverage.part1.${TPU_VERSION:-tpu6e}; else exit 1; fi"
          - cp /mnt/disks/persist/models/.coverage.part1.${TPU_VERSION:-tpu6e} ./

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests part2"
        key: ${TPU_VERSION:-tpu6e}_test_7_2
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        artifact_paths: ".coverage.part2.${TPU_VERSION:-tpu6e}"
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - rm -f .coverage.part2.${TPU_VERSION:-tpu6e}
          - |
            .buildkite/scripts/run_in_docker.sh bash -c "python3 -m pytest -s -v -x /workspace/tpu_inference/tests/ --ignore=/workspace/tpu_inference/tests/layers/vllm/backends/test_flash_attn.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_awq.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_moe.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_fp8.py --ignore=/workspace/tpu_inference/tests/layers/vllm/test_compressed_tensors_w8a8_int8.py --ignore=/workspace/tpu_inference/tests/kernels --ignore=/workspace/tpu_inference/tests/lora --ignore=/workspace/tpu_inference/tests/e2e --ignore=/workspace/tpu_inference/tpu_inference/mock --ignore=/workspace/tpu_inference/tests/models/jax/test_deepseek_v3.py --ignore=/workspace/tpu_inference/tests/offload/tpu_offload_multi_request_accuracy_test.py --ignore=/workspace/tpu_inference/tests/offload/tpu_offload_accuracy_test.py --ignore=/workspace/tpu_inference/tests/offload/tpu_offload_performance_test.py --cov-config=/workspace/tpu_inference/.coveragerc --cov tpu_inference; if [ -f .coverage ]; then cp .coverage /tmp/hf_home/.coverage.part2.${TPU_VERSION:-tpu6e}; else exit 1; fi"
          - cp /mnt/disks/persist/models/.coverage.part2.${TPU_VERSION:-tpu6e} ./

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests combine and report"
        depends_on:
          - "${TPU_VERSION:-tpu6e}_test_7_1"
          - "${TPU_VERSION:-tpu6e}_test_7_2"
        key: ${TPU_VERSION:-tpu6e}_test_7_3
        soft_fail: true
        agents:
          queue: cpu
        commands:
          - "buildkite-agent artifact download \".coverage.part*\" ."
          - curl -L https://github.com/pantsbuild/pex/releases/download/v2.1.151/pex -o pex
          - chmod +x pex
          - python3 ./pex coverage -c coverage -o coverage.pex
          - |
            echo "[paths]" > .coveragerc
            echo "source =" >> .coveragerc
            echo "    ." >> .coveragerc
            echo "    /workspace/tpu_inference/" >> .coveragerc
          - |
            python3 ./coverage.pex combine .coverage.part1.${TPU_VERSION:-tpu6e} .coverage.part2.${TPU_VERSION:-tpu6e}
            python3 ./coverage.pex report --fail-under=69
            EXIT_CODE=$?
            rm -f .coverage.part* .coveragerc pex coverage.pex .coverage
            exit $EXIT_CODE

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests - kernels"
        key: ${TPU_VERSION:-tpu6e}_test_8
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - |
            echo "--- Fetching changed files from metadata"
            FILES_CHANGED=$$(buildkite-agent meta-data get "changed_files" --default "" | tr ',' '\n')
            echo "$${FILES_CHANGED}"

            if [[ "$$NIGHTLY" == "1" ]] || echo "$$FILES_CHANGED" | grep -qE '^(tpu_inference/kernels|tests/kernels|requirements.txt)'; then
              .buildkite/scripts/run_in_docker.sh \
                python3 -m pytest -s -v -x /workspace/tpu_inference/tests/kernels \
                --ignore=/workspace/tpu_inference/tests/kernels/ragged_paged_attention_kernel_v2_test.py \
                --ignore=/workspace/tpu_inference/tests/kernels/ragged_kv_cache_update_v2_test.py \
                --ignore=/workspace/tpu_inference/tests/kernels/collectives \
                --ignore=/workspace/tpu_inference/tests/kernels/spmm_v1_test.py
            else
              echo "Skipping: Step requires either a NIGHTLY build or changes in kernels, kernel tests, or requirements.txt."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} JAX unit tests - collective kernels"
        key: ${TPU_VERSION:-tpu6e}_test_9
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - |
            echo "--- Fetching changed files from metadata"
            FILES_CHANGED=$$(buildkite-agent meta-data get "changed_files" --default "" | tr ',' '\n')
            echo "$${FILES_CHANGED}"

            if [[ "$$NIGHTLY" == "1" ]] || echo "$$FILES_CHANGED" | grep -qE '^(tpu_inference/kernels/collectives|tests/kernels/collectives|requirements.txt)'; then
              .buildkite/scripts/run_in_docker.sh \
                python3 -m pytest -s -v -x /workspace/tpu_inference/tests/kernels/collectives
            else
              echo "Skipping: Step requires either a NIGHTLY build or changes in kernels/collectives, tests, or requirements.txt."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} lora e2e tests for JAX + vLLM models single chip"
        key: ${TPU_VERSION:-tpu6e}_test_10
        soft_fail: true
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_lora.py'

      - label: "${TPU_VERSION:-tpu6e} E2E MLPerf tests for JAX + vLLM models on multiple chips"
        key: ${TPU_VERSION:-tpu6e}_test_11
        soft_fail: true
        env:
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh

      # TODO (jacobplatin): re-enable this after b/467105149 is fixed
      - label: "${TPU_VERSION:-tpu6e} E2E MLperf tests for DeepSeek-R1 (no accuracy, 5-decoder layers only)"
        key: ${TPU_VERSION:-tpu6e}_test_12
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          NEW_MODEL_DESIGN: "1"
          USE_V6E8_QUEUE: "False"
          SKIP_ACCURACY_TESTS: "True"
          VLLM_MLA_DISABLE: "0"
          MOE_REQUANTIZE_BLOCK_SIZE: "512"
          MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
          MODEL_IMPL_TYPE: "flax_nnx"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - |
            if [[ "$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mlperf.sh -m "gs://tpu-commons-ci/deepseek/r1"
            else
              echo "Skipping: Step requires TPU v7x."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} E2E MMLU for DeepSeek-R1 torchax backend"
        key: ${TPU_VERSION:-tpu6e}_test_14
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          NEW_MODEL_DESIGN: "1"
          SKIP_ACCURACY_TESTS: "False"
          VLLM_MLA_DISABLE: "0"
          MOE_REQUANTIZE_BLOCK_SIZE: "512"
          MOE_REQUANTIZE_WEIGHT_DTYPE: "fp4"
          MODEL_IMPL_TYPE: "vllm"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - |
            if [[ "$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/mmlu.sh -m  "gs://tpu-commons-ci/deepseek/r1" -n 14042 -l 4
            else
              echo "Skipping: Step requires TPU v7x."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} lora e2e tests for JAX + vLLM models multi chips"
        key: ${TPU_VERSION:-tpu6e}_test_13
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
          TEST_LORA_TP: "True"
          VLLM_LOG_LEVEL: "INFO"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bash -c 'MODEL_IMPL_TYPE=vllm TPU_BACKEND_TYPE=jax python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_lora.py'

      - label: "${TPU_VERSION:-tpu6e} lora unit tests on single chip"
        key: ${TPU_VERSION:-tpu6e}_test_15
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_SINGLE:-tpu_v6e_queue}
        commands:
          - |
            .buildkite/scripts/run_in_docker.sh \
              bash -c ' python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_bgmv.py && \
              python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_layers.py'

      - label: "${TPU_VERSION:-tpu6e} lora unit tests on multi chips"
        key: ${TPU_VERSION:-tpu6e}_test_16
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
          USE_V6E8_QUEUE: "True"
          VLLM_LOG_LEVEL: "INFO"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - .buildkite/scripts/run_in_docker.sh bash -c 'python3 -m pytest -s -v -x /workspace/tpu_inference/tests/lora/test_layers.py'

      - label: "${TPU_VERSION:-tpu6e} E2E lm_eval accuracy check qwen3 coder with fused moe."
        key: ${TPU_VERSION:-tpu6e}_test_17
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8" --use_moe_ep_kernel 1 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 1 --flex_threshold 0.85 --strict_threshold 0.70
            else
              echo "Skipping: Step requires TPU v7x and either a NIGHTLY build or kernel/requirements changes."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} E2E lm_eval accuracy check qwen3 coder with gmm kernel."
        key: ${TPU_VERSION:-tpu6e}_test_18
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8" --use_moe_ep_kernel 0 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 1 --flex_threshold 0.85 --strict_threshold 0.70
            else
              echo "Skipping: Step requires TPU v7x and either a NIGHTLY build or kernel/requirements changes."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} E2E lm_eval accuracy check gpt oss."
        key: ${TPU_VERSION:-tpu6e}_test_19
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        # The strict-match is failing due to pattern mismatch, see #2318 for details.
        # TODO(#2318): set proper strict-match threshold.
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/check_lm_eval.sh  --model_name "openai/gpt-oss-120b" --use_moe_ep_kernel 1 --tensor_parallel_size 8 --max_model_len 2048 --max_num_batched_tokens 2048 --max_gen_toks 256 --enable_expert_parallel 1 --flex_threshold 0.50 --strict_threshold 0.0
            else
              echo "Skipping: Step requires TPU v7x and either a NIGHTLY build or kernel/requirements changes."
              exit 0
            fi

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 1k 8k with fused moe kernel."
        key: ${TPU_VERSION:-tpu6e}_test_20
        soft_fail: true
        env:
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.15  --output_token_tput_limit 1170 --total_token_tput_limit 1314 --input_len 1024 --output_len 8192 --use_moe_ep_kernel 1
            fi

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 8k 1k with fused moe kernel."
        key: ${TPU_VERSION:-tpu6e}_test_21
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.4  --output_token_tput_limit 381 --total_token_tput_limit 3421 --input_len 8192 --output_len 1024 --use_moe_ep_kernel 1
            fi

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 1k 8k with gmm kernel."
        key: ${TPU_VERSION:-tpu6e}_test_22
        soft_fail: true
        env:
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        if: build.env("NIGHTLY") == "1"
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
              .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/bm_qwen3_coder.sh --model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8 --tp 8 --req_tput_limit 0.16  --output_token_tput_limit 1673 --total_token_tput_limit 1881 --input_len 1024 --output_len 8192 --use_moe_ep_kernel 0
            fi

      - label: "${TPU_VERSION:-tpu6e} Perf regression test for qwen3 coder 8k 1k with gmm kernel."
        key: ${TPU_VERSION:-tpu6e}_test_23
        depends_on: "${TPU_VERSION:-tpu6e}_build_docker"
        soft_fail: true
        env:
          USE_PREBUILT_IMAGE: "1"
          TPU_VERSION: "${TPU_VERSION:-tpu6e}"
        agents:
          queue: ${TPU_QUEUE_MULTI:-tpu_v6e_8_queue}
        commands:
          - |
            if [[ "$$TPU_VERSION" == "tpu7x" ]]; then
